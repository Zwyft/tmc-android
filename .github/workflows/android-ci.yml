name: Android CI

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64-v8a, armeabi-v7a, x86_64, x86]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Remove stale submodule references
        run: |
          rm -rf libs/ViruaPPU/.git libs/VirtuaAPU/.git libs/tmc-Android-Experimental/.git 2>/dev/null; true
          rm -rf .git/modules/libs 2>/dev/null; true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache NDK
        uses: actions/cache@v4
        with:
          path: ~/android-ndk
          key: ndk-${{ runner.os }}-r27

      - name: Install NDK
        run: |
          if [ ! -d "$HOME/android-ndk" ]; then
            wget -q https://dl.google.com/android/repository/android-ndk-r27-linux.zip
            unzip -q android-ndk-r27-linux.zip -d $HOME/android-ndk
            rm android-ndk-r27-linux.zip
          fi
          echo "ANDROID_NDK_HOME=$HOME/android-ndk/android-ndk-r27" >> $GITHUB_ENV

      - name: Generate sounds embed
        run: python3 tools/generate_sounds_embed.py assets/sounds.json port/generated_sounds_embed.cpp
        continue-on-error: true

      - name: Build with Gradle
        run: ./gradlew assembleDebug
        working-directory: android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ORG_GRADLE_PROJECT_ANDROID__NDK__HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             artifacts/tmc-android-${{ matrix.arch }}-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tmc-android-${{ matrix.arch }}
          path: artifacts/tmc-android-${{ matrix.arch }}-debug.apk
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Package release assets
        run: |
          mkdir release-assets
          for dir in release-artifacts/*/; do
            name=$(basename "$dir")
            cp "$dir"/*.apk release-assets/
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: TMC Android ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          draft: true
          prerelease: true
          generate_release_notes: true
          files: release-assets/*
          body: |
            ## The Legend of Zelda: The Minish Cap — Android Port

            ### Build ${{ github.ref_name }}

            **Architecture builds:**
            - `tmc-android-arm64-v8a-debug.apk` — 64-bit ARM (most modern devices)
            - `tmc-android-armeabi-v7a-debug.apk` — 32-bit ARM (older devices)
            - `tmc-android-x86_64-debug.apk` — 64-bit x86 (emulators, Chromebooks)
            - `tmc-android-x86-debug.apk` — 32-bit x86 (older emulators)

            ### Installation

            1. Download the APK for your device architecture
            2. Place `baserom.gba` in `Android/data/org.tmc/files/` on your device
            3. Install and run

            ### Notes
            - This is an **experimental** port — many features are still WIP
            - The GBA PPU renderer (ViruaPPU) uses stub placeholders; full rendering requires the proprietary ViruaPPU library
            - Requires Android 7.0+ (API 24)
            - OpenGL ES 3.0 required
