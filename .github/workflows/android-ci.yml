name: Android CI

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      # submodule directories checked into the parent repo have stale .git
      # pointers to private repos we can't reach — wipe them so CMake's
      # file(GLOB) and the SDK's indexer see only the port's own stubs.
      - name: Remove stale submodule references
        run: |
          rm -rf libs/ViruaPPU/.git libs/VirtuaAPU/.git libs/tmc-Android-Experimental/.git
          rm -rf .git/modules/libs

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "ndk.dir=$ANDROID_HOME/ndk/$(ls $ANDROID_HOME/ndk/ | sort -V | tail -1)" >> android/local.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
            android/local.properties
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build with Gradle
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          find android/app/build/outputs -name "*.apk" -exec cp {} artifacts/ \;
          ls -lh artifacts/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tmc-android-apks
          path: artifacts/
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          name: tmc-android-apks
          path: release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: TMC Android ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          draft: true
          prerelease: true
          generate_release_notes: true
          files: release-assets/*
          body: |
            ## The Legend of Zelda: The Minish Cap — Android Port

            ### Build ${{ github.ref_name }}

            **APKs:**
            - `app-arm64-v8a-debug.apk` — 64-bit ARM (most modern devices)
            - `app-armeabi-v7a-debug.apk` — 32-bit ARM (older devices)
            - `app-x86_64-debug.apk` — 64-bit x86 (emulators, Chromebooks)
            - `app-x86-debug.apk` — 32-bit x86 (older emulators)

            ### Installation
            1. Download the APK for your device architecture
            2. Place `baserom.gba` in `Android/data/org.tmc/files/` on your device
            3. Install and run

            ### Notes
            - **Experimental** — the GBA PPU renderer (ViruaPPU) is stubbed (green screen)
            - Requires Android 7.0+ (API 24), OpenGL ES 3.0
